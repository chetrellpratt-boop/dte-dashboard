
<!DOCTYPE html>
<html>
<head>
  <title>DTE Live Negative Monitoring</title>
  <style>
    body { margin:0; font-family: Arial; display:flex; }
    .sidebar { width:220px; background:#111; color:#fff; height:100vh; padding:15px }
    .nav-item { margin:10px 0; cursor:pointer }
    .main { flex:1; padding:20px; background:#f4f6f8 }
    .card { background:white; padding:12px; border-radius:8px; margin-bottom:10px }
    .high { border-left:6px solid red }
    .medium { border-left:6px solid orange }
    .low { border-left:6px solid green }
    .feed { max-height:500px; overflow:auto }
  </style>
</head>
<body>

<div class="sidebar">
  <h3>DTE Live Feed</h3>
  <div class="nav-item" onclick="show('live')">Live Feed</div>
  <div class="nav-item" onclick="show('alerts')">Alerts</div>
  <div class="nav-item" onclick="show('notes')">Notes</div>
</div>

<div class="main">

<div id="live">
  <h2>Real-Time Negative Mentions (Simulated)</h2>
  <div class="feed" id="feed"></div>
</div>

<div id="alerts" style="display:none">
  <h2>High Risk Alerts</h2>
  <div id="alertsBox"></div>
</div>

<div id="notes" style="display:none">
  <h2>Analyst Notes</h2>
  <textarea id="notesArea" placeholder="Write observations..."></textarea>
</div>

</div>

<script>
let feed = [];

function analyze(t){
 t=t.toLowerCase();
 let risk='low';
 if(t.includes('worst')||t.includes('terrible')||t.includes('outrageous')) risk='medium';
 if(t.includes('hate')||t.includes('lawsuit')||t.includes('fraud')) risk='high';
 return risk;
}

function simulate(){
 const samples=[
  "DTE outage again worst service ever",
  "My DTE bill is outrageous",
  "DTE is terrible I have no power",
  "Power still out this is unacceptable DTE",
  "DTE customer service is the worst",
  "People should complain about DTE",
  "Another outage? DTE is unreliable"
 ];

 const random=samples[Math.floor(Math.random()*samples.length)];
 const post={text:random,time:new Date().toLocaleTimeString(),risk:analyze(random)};

 feed.unshift(post);

 render();
 updateAlerts();
}

function render(){
 document.getElementById('feed').innerHTML = feed.map(p=>`
  <div class='card ${p.risk}'>
   <b>${p.risk.toUpperCase()}</b>
   <p>${p.text}</p>
   <small>${p.time}</small>
  </div>
 `).join('');
}

function updateAlerts(){
 const high=feed.filter(p=>p.risk==='high');
 document.getElementById('alertsBox').innerHTML = high.map(p=>`<div class='card high'>${p.text}</div>`).join('');
}

function show(id){
 document.getElementById('live').style.display='none';
 document.getElementById('alerts').style.display='none';
 document.getElementById('notes').style.display='none';
 document.getElementById(id).style.display='block';
}

setInterval(simulate,4000);
</script>

</body>
</html>
